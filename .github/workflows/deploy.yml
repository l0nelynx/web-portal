name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_BRAND_NAME: ${{ vars.VITE_BRAND_NAME }}
          VITE_BRAND_LOGO: ${{ vars.VITE_BRAND_LOGO }}
          VITE_MIRRORS: ${{ vars.VITE_MIRRORS }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
          VITE_GA_ID: ${{ vars.VITE_GA_ID }}
          VITE_BOT_URL: ${{ vars.VITE_BOT_URL }}
          VITE_SELLER_NAME: ${{ vars.VITE_SELLER_NAME }}
          # scripts/prerender.mjs (postbuild) inherits VITE_BRAND_NAME from this env block
          VITE_TG_BOT_ID: ${{ vars.VITE_TG_BOT_ID }}

      - name: Write custom domain
        if: vars.PAGES_CNAME != ''
        run: echo "${{ vars.PAGES_CNAME }}" > dist/CNAME

      - name: SEO — inject canonical URL and generate sitemap
        if: vars.VITE_SITE_URL != ''
        env:
          SITE_URL: ${{ vars.VITE_SITE_URL }}
        run: |
          DATE=$(date +%Y-%m-%d)

          # Inject canonical + og:url into index.html (after <meta name="robots">)
          sed -i "s|<meta name=\"robots\" content=\"index, follow\" />|<meta name=\"robots\" content=\"index, follow\" />\n    <link rel=\"canonical\" href=\"${SITE_URL}/\" />\n    <meta property=\"og:url\" content=\"${SITE_URL}/\" />|" dist/index.html

          # Generate sitemap.xml
          cat > dist/sitemap.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>${SITE_URL}/</loc>
              <changefreq>weekly</changefreq>
              <priority>1.0</priority>
              <lastmod>${DATE}</lastmod>
            </url>
            <url>
              <loc>${SITE_URL}/register</loc>
              <changefreq>monthly</changefreq>
              <priority>0.8</priority>
              <lastmod>${DATE}</lastmod>
            </url>
            <url>
              <loc>${SITE_URL}/login</loc>
              <changefreq>monthly</changefreq>
              <priority>0.5</priority>
            </url>
            <url>
              <loc>${SITE_URL}/policy</loc>
              <changefreq>yearly</changefreq>
              <priority>0.3</priority>
              <lastmod>${DATE}</lastmod>
            </url>
            <url>
              <loc>${SITE_URL}/agreement</loc>
              <changefreq>yearly</changefreq>
              <priority>0.3</priority>
              <lastmod>${DATE}</lastmod>
            </url>
            <url>
              <loc>${SITE_URL}/offer</loc>
              <changefreq>yearly</changefreq>
              <priority>0.3</priority>
              <lastmod>${DATE}</lastmod>
            </url>
          </urlset>
          EOF

          # Append Sitemap directive to robots.txt
          echo "Sitemap: ${SITE_URL}/sitemap.xml" >> dist/robots.txt

          # GitHub Pages has no server-side rewrite: any path other than "/" falls
          # through to 404.html (real HTTP 404 + JS redirect), which is why Google
          # reports /login and /register as "Discovered - currently not indexed".
          # Serve real 200 responses for the routes in the sitemap by copying the
          # built index.html into each route's own directory, with a self-referencing
          # canonical/og:url (not the homepage's) so Google indexes them as distinct
          # pages instead of canonicalizing them back to "/".
          for route in login register policy agreement offer; do
            mkdir -p "dist/${route}"
            sed \
              -e "s|<link rel=\"canonical\" href=\"${SITE_URL}/\" />|<link rel=\"canonical\" href=\"${SITE_URL}/${route}\" />|" \
              -e "s|<meta property=\"og:url\" content=\"${SITE_URL}/\" />|<meta property=\"og:url\" content=\"${SITE_URL}/${route}\" />|" \
              dist/index.html > "dist/${route}/index.html"
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
