name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_BRAND_NAME: ${{ vars.VITE_BRAND_NAME }}
          VITE_BRAND_LOGO: ${{ vars.VITE_BRAND_LOGO }}
          VITE_MIRRORS: ${{ vars.VITE_MIRRORS }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
          VITE_GA_ID: ${{ vars.VITE_GA_ID }}
          VITE_BOT_URL: ${{ vars.VITE_BOT_URL }}
          VITE_SELLER_NAME: ${{ vars.VITE_SELLER_NAME }}
          # scripts/prerender.mjs (postbuild) inherits VITE_BRAND_NAME from this env block
          VITE_TG_BOT_ID: ${{ vars.VITE_TG_BOT_ID }}

      - name: Write custom domain
        if: vars.PAGES_CNAME != ''
        run: echo "${{ vars.PAGES_CNAME }}" > dist/CNAME

      - name: SEO — inject canonical URL and generate sitemap
        if: vars.VITE_SITE_URL != ''
        env:
          SITE_URL: ${{ vars.VITE_SITE_URL }}
          BRAND: ${{ vars.VITE_BRAND_NAME }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRAND="${BRAND:-Cheeze Networks}"

          # Inject canonical + og:url into index.html (after <meta name="robots">)
          sed -i "s|<meta name=\"robots\" content=\"index, follow\" />|<meta name=\"robots\" content=\"index, follow\" />\n    <link rel=\"canonical\" href=\"${SITE_URL}/\" />\n    <meta property=\"og:url\" content=\"${SITE_URL}/\" />|" dist/index.html

          # Sitemap: homepage only for brand SERP. Auth/legal routes are noindex
          # (see shells below) so they must not appear here.
          cat > dist/sitemap.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>${SITE_URL}/</loc>
              <changefreq>weekly</changefreq>
              <priority>1.0</priority>
              <lastmod>${DATE}</lastmod>
            </url>
          </urlset>
          EOF

          # Append Sitemap directive to robots.txt
          echo "Sitemap: ${SITE_URL}/sitemap.xml" >> dist/robots.txt

          # GitHub Pages has no server-side rewrite: paths other than "/" fall
          # through to 404.html. Copy index.html into each public route folder so
          # users get HTTP 200. Legal + auth shells get noindex + unique titles and
          # the landing prerender stripped so they cannot outrank the homepage.
          strip_prerender() {
            # Empty #web-root so crawlers without JS do not see homepage HTML.
            # Built assets live in <head>; web-root is followed by </body>.
            node -e '
              const fs = require("fs");
              const p = process.argv[1];
              let h = fs.readFileSync(p, "utf8");
              h = h.replace(
                /<div id="web-root">[\s\S]*<\/div>(\s*<\/body>)/,
                "<div id=\"web-root\"></div>$1"
              );
              fs.writeFileSync(p, h);
            ' "$1"
          }

          write_shell() {
            local route="$1" title="$2" robots="$3"
            mkdir -p "dist/${route}"
            # Use # as sed delimiter — titles contain "|" (e.g. "Sign In | Brand").
            sed \
              -e "s#<meta name=\"robots\" content=\"index, follow\" />#<meta name=\"robots\" content=\"${robots}\" />#" \
              -e "s#<link rel=\"canonical\" href=\"${SITE_URL}/\" />#<link rel=\"canonical\" href=\"${SITE_URL}/${route}/\" />#" \
              -e "s#<meta property=\"og:url\" content=\"${SITE_URL}/\" />#<meta property=\"og:url\" content=\"${SITE_URL}/${route}/\" />#" \
              -e "s#<title>[^<]*</title>#<title>${title}</title>#" \
              -e "s#<meta property=\"og:title\" content=\"[^\"]*\" />#<meta property=\"og:title\" content=\"${title}\" />#" \
              -e "s#<meta name=\"twitter:title\" content=\"[^\"]*\" />#<meta name=\"twitter:title\" content=\"${title}\" />#" \
              dist/index.html > "dist/${route}/index.html"
            strip_prerender "dist/${route}/index.html"
          }

          write_shell login "Sign In | ${BRAND}" "noindex, follow"
          write_shell register "Create Account | ${BRAND}" "noindex, follow"
          write_shell policy "Privacy Policy | ${BRAND}" "noindex, follow"
          write_shell agreement "User Agreement | ${BRAND}" "noindex, follow"
          write_shell offer "Public Offer | ${BRAND}" "noindex, follow"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
