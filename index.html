<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>%VITE_BRAND_NAME% — Private & Secure VPN</title>
    <meta name="description" content="Fast, encrypted VPN that keeps your connection private on any network. No activity logs, no tracking — for individuals and businesses. Get started free in Telegram." />
    <meta name="keywords" content="VPN, Cheezy VPN, private VPN, secure VPN, fast VPN, Vless VPN, V2ray VPN, online privacy, encrypted connection, no-logs VPN" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="%VITE_BRAND_NAME%" />

    <!-- Open Graph (social previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="%VITE_BRAND_NAME%" />
    <meta property="og:title" content="%VITE_BRAND_NAME% — Private & Secure VPN" />
    <meta property="og:description" content="Fast, encrypted VPN that keeps your connection private. No activity logs, no tracking — for individuals and businesses." />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="%VITE_BRAND_NAME% — Private & Secure VPN" />
    <meta name="twitter:description" content="Fast, encrypted VPN that keeps your connection private. No logs, no tracking." />

    <!-- JSON-LD structured data (URL injected by CI via sitemap step) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "%VITE_BRAND_NAME%",
      "description": "Fast, encrypted VPN that keeps your connection private on any network. No activity logs, no tracking — for individuals and businesses."
    }
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '%VITE_GA_ID%', { send_page_view: false });
    </script>
  </head>
  <body>
    <div id="web-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
