<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>%VITE_BRAND_NAME% — Secure Private VPN</title>
    <meta name="description" content="Secure, high-performance VPN access for teams and individuals. Zero-trust architecture, global infrastructure, enterprise-grade reliability. Sign up with an invitation code." />
    <meta name="keywords" content="VPN, private network, secure connectivity, zero trust, enterprise VPN, fast VPN" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="%VITE_BRAND_NAME%" />

    <!-- Open Graph (social previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="%VITE_BRAND_NAME%" />
    <meta property="og:title" content="%VITE_BRAND_NAME% — Secure Private VPN" />
    <meta property="og:description" content="Secure, high-performance VPN for teams. Zero-trust architecture, global infrastructure, enterprise reliability." />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="%VITE_BRAND_NAME% — Secure Private VPN" />
    <meta name="twitter:description" content="Secure, high-performance VPN for teams and individuals." />

    <!-- JSON-LD structured data (URL injected by CI via sitemap step) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "%VITE_BRAND_NAME%",
      "description": "Secure, high-performance VPN access for teams and individuals. Zero-trust architecture, enterprise-grade reliability."
    }
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="web-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
